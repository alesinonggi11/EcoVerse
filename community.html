<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoVerse | Community</title>
  <!-- <link rel="stylesheet" href="css/bootstrap.min.css"> -->
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css"/>
  <style>
    /* ===== FONT PIXEL ===== */
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    /* ===== RESET ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Press Start 2P', cursive;
      color: #1a3e2a;
      background-image: url('img/beranda1.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    /* ===== HEADER ===== */
    header {
      background: rgba(240, 255, 240, 0.85);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 25px;
      border-bottom: 3px solid #1a3e2a;
      flex-wrap: wrap;
            position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 14px;
      color: #1a3e2a;
      margin-bottom: 10px;
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    nav a {
      text-decoration: none;
      color: #1a3e2a;
      margin: 0 10px;
      transition: 0.2s;
      font-size: 10px;
    }

    nav a:hover {
      color: #2e8b57;
    }

    .join-btn {
      background: #2e8b57;
      color: #fff;
      padding: 10px 20px;
      border: 3px solid #1a3e2a;
      cursor: pointer;
      font-size: 10px;
      margin-top: 10px;
    }

    .join-btn:hover {
      background: #3fbf78;
    }

    /* ===== HERO ===== */
    .hero {
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 80px 20px;
    }

    .feature-text {
      max-width: 600px;
      background: rgba(240, 255, 240, 0.9);
      border: 3px solid #1a3e2a;
      padding: 30px;
      box-shadow: 3px 3px 0 #1a3e2a;
    }

    .hero h1 {
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .hero button {
      background: #2e8b57;
      color: #fff;
      border: 3px solid #1a3e2a;
      padding: 12px 20px;
      cursor: pointer;
      font-size: 10px;
    }

    .hero button:hover {
      background: #3fbf78;
    }

    /* ===== Community Section ===== */
    .community-section {
      background: rgba(255, 255, 255, 0.9);
      margin: 2rem auto;
      width: 90%;
      max-width: 1100px;
      padding: 2rem;
      border: 4px solid #1a2e1a;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
      animation: fadeIn 1s ease;
    }

    .community-section h2 {
      font-size: 1rem;
      margin-bottom: 1rem;
      color: #1a2e1a;
    }

    /* GALLERY */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1rem;
      margin: 2rem 0;
    }

    .gallery img {
      width: 100%;
      border: 3px solid #1a2e1a;
      border-radius: 10px;
      transition: transform 0.3s, filter 0.3s;
    }

    .gallery img:hover {
      transform: scale(1.05);
      filter: brightness(1.1);
    }

    /* Forum Section */
    .forum {
      background: rgba(255,255,255,0.95);
      border: 3px solid #1a2e1a;
      border-radius: 10px;
      padding: 1rem;
      text-align: left;
    }

    .forum h3 {
      font-size: 0.9rem;
      margin-bottom: 1rem;
      text-align: center;
    }

    .post {
      border-bottom: 2px dashed #2b582b;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
    }

    .post strong {
      color: #2b582b;
    }

    textarea {
      width: 100%;
      border: 2px solid #1a2e1a;
      border-radius: 8px;
      padding: 10px;
      font-family: 'Press Start 2P', cursive;
      font-size: 0.6rem;
      resize: none;
    }

    .submit-btn {
      background: #2b582b;
      color: white;
      border: 3px solid #163a16;
      padding: 8px 16px;
      font-size: 0.6rem;
      border-radius: 8px;
      margin-top: 10px;
      transition: 0.2s;
    }

    .submit-btn:hover {
      background: #3c7540;
      transform: scale(1.05);
    }

    footer {
      margin-top: 3rem;
      background: rgba(255,255,255,0.8);
      padding: 1rem;
      border-top: 3px solid #2b582b;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }

/* ===================== RESPONSIVE ======================= */
    button {
      font-family: 'Press Start 2P', cursive;
      padding: 12px 18px;
      background: #1c7c1c;
      border: 3px solid #0f4f0f;
      color: white;
      cursor: pointer;
      transition: 0.2s;
      border-radius: 6px;
      font-size: 10px;
    }

    button:hover {
      background: #34a834;
    }

    /* ===== RESPONSIVE BREAKPOINTS ===== */

    /* Tablet */
    @media (max-width: 992px) {
      header {
        flex-direction: column;
        text-align: center;
      }

      .hero h1 {
        font-size: 12px;
      }

      .feature-text {
        width: 90%;
      }

      .feature-box {
        width: 200px;
      }
    }

    /* HP */
    @media (max-width: 600px) {
      body {
        background-attachment: scroll;
      }

      .hero {
        padding: 60px 10px;
      }

      .hero h1 {
        font-size: 10px;
      }

      nav a {
        font-size: 8px;
      }

      .join-btn {
        padding: 4px 10px;
        font-size: 8px;
      }

      .feature-box {
        width: 90%;
      }

      .feature-box p {
        font-size: 7px;
      }

      footer {
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      footer div {
        margin-bottom: 15px;
      }
    }   
  </style>
</head>
<body>

 <header>
    <div class="logo">🌿 EcoVerse</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="challenge.html">Challenge</a>
      <a href="community.html">Community</a>
      <a href="test.html">Showcase</a>
    </nav>
    <a href="profile.html"><button class="join-btn">Profile Tim</button></a>
  </header>

  <section class="community-section" data-aos="fade-up">
    <div class="forum" data-aos="fade-up">
      <h3>🗨️ Forum Diskusi</h3>

      <div id="posts">
        <div class="post"><strong>@GreenVibe:</strong> Baru saja tanam 5 pohon di halaman belakang 🌳</div>
        <div class="post"><strong>@PixelNature:</strong> Kami buat komposter dari sampah dapur, hasilnya keren banget!</div>
      </div>

      <textarea id="message" placeholder="Tulis pesanmu di sini..."></textarea><br>
      <button class="submit-btn" onclick="addPost()">Kirim Pesan</button>
    </div>
  </section>



  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    AOS.init({ duration: 1000, once: true });

    // Simulasi forum (komentar lokal)
    function addPost() {
      const msg = document.getElementById("message").value.trim();
      if (msg !== "") {
        const newPost = document.createElement("div");
        newPost.classList.add("post");
        newPost.innerHTML = "<strong>@You:</strong> " + msg;
        document.getElementById("posts").prepend(newPost);
        document.getElementById("message").value = "";
      }
    }
  </script>
<!-- FOOTER -->
</body>
</html>
